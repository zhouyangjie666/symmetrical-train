<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI口语陪练与纠音系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 10px;
        }

        .app-slogan {
            font-size: 16px;
            color: #4a5568;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            color: #4a5568;
            background: white;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group {
            position: relative;
        }

        .verification-code {
            display: flex;
            gap: 10px;
        }

        .verification-code input {
            flex: 1;
        }

        .get-code-btn {
            padding: 0 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .get-code-btn:hover {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .get-code-btn:disabled {
            background: #e2e8f0;
            color: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 30px 0;
        }

        .login-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-3px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .option-link {
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .option-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .guest-mode {
            text-align: center;
            margin-top: 20px;
        }

        .guest-btn {
            padding: 12px 24px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .guest-btn:hover {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .agreement {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #4a5568;
        }

        .agreement input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
        }

        .agreement a {
            color: #667eea;
            text-decoration: none;
        }

        .agreement a:hover {
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-container {
                padding: 40px 20px;
            }

            .logo {
                width: 80px;
                height: 80px;
                font-size: 36px;
            }

            .app-name {
                font-size: 24px;
            }

            .form-input {
                padding: 12px 16px;
                font-size: 14px;
            }

            .login-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">🎯</div>
            <h1 class="app-name">AI口语陪练</h1>
            <p class="app-slogan">AI个性化口语陪练，告别哑巴英语</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label">手机号</label>
                <div class="input-group">
                    <input type="tel" class="form-input" placeholder="请输入手机号" pattern="1[3-9]\d{9}" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div class="verification-code">
                    <input type="text" class="form-input" placeholder="请输入验证码" pattern="\d{6}" required>
                    <button type="button" class="get-code-btn">获取验证码</button>
                </div>
            </div>

            <button type="submit" class="login-btn">登录</button>

            <div class="options">
                <a href="register.html" class="option-link">注册账号</a>
                <a href="forgot-password.html" class="option-link">忘记密码</a>
            </div>

            <div class="agreement">
                <input type="checkbox" id="agreement" required>
                <label for="agreement">我已阅读并同意 <a href="terms.html">用户协议</a> 和 <a href="privacy.html">隐私政策</a></label>
            </div>

            <div class="guest-mode">
                <button type="button" class="guest-btn">游客模式</button>
            </div>
        </form>
    </div>

    <script>
        // 获取验证码按钮
        const getCodeBtn = document.querySelector('.get-code-btn');
        let countdown = 60;

        getCodeBtn.addEventListener('click', function() {
            const phoneInput = document.querySelector('input[type="tel"]');
            const phoneNumber = phoneInput.value;

            if (!/1[3-9]\d{9}/.test(phoneNumber)) {
                alert('请输入正确的手机号');
                return;
            }

            // 模拟发送验证码
            console.log('发送验证码到:', phoneNumber);
            alert('验证码已发送');

            // 开始倒计时
            getCodeBtn.disabled = true;
            getCodeBtn.textContent = `${countdown}秒后重发`;

            const timer = setInterval(() => {
                countdown--;
                getCodeBtn.textContent = `${countdown}秒后重发`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    getCodeBtn.disabled = false;
                    getCodeBtn.textContent = '获取验证码';
                    countdown = 60;
                }
            }, 1000);
        });

        // 登录表单提交
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phoneInput = document.querySelector('input[type="tel"]');
            const codeInput = document.querySelector('input[type="text"]');
            const agreement = document.getElementById('agreement');

            if (!phoneInput.value || !codeInput.value) {
                alert('请填写完整信息');
                return;
            }

            if (!agreement.checked) {
                alert('请阅读并同意用户协议和隐私政策');
                return;
            }

            // 模拟登录验证
            console.log('登录验证:', phoneInput.value, codeInput.value);
            
            // 登录成功后跳转到首页
            window.location.href = 'index.html';
        });

        // 游客模式
        const guestBtn = document.querySelector('.guest-btn');
        guestBtn.addEventListener('click', function() {
            console.log('进入游客模式');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
