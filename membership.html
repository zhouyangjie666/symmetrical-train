<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员权益 - AI口语陪练与纠音系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px; /* 为底部Tab栏留出空间 */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            background: white;
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #edf2f7;
            transform: translateX(-5px);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            flex: 1;
            text-align: center;
        }

        /* 会员卡片区域 */
        .membership-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .membership-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .membership-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .membership-card.popular {
            border: 2px solid #667eea;
        }

        .popular-badge {
            position: absolute;
            top: -10px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .membership-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .membership-name {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
        }

        .membership-price {
            text-align: right;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .price-unit {
            font-size: 14px;
            color: #4a5568;
        }

        .membership-features {
            margin-bottom: 25px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #4a5568;
        }

        .feature-item i {
            color: #48bb78;
            font-size: 16px;
        }

        .feature-item.unavailable i {
            color: #e2e8f0;
        }

        .feature-item.unavailable {
            color: #a0aec0;
        }

        .select-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .select-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-3px);
        }

        .select-btn.outlined {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .select-btn.outlined:hover {
            background: #f7fafc;
        }

        /* 底部Tab栏 */
        .bottom-tab {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            border-radius: 20px 20px 0 0;
            padding: 15px 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .tab-list {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 12px;
        }

        .tab-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-icon {
            font-size: 20px;
        }

        .tab-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                padding-bottom: 70px;
            }

            .header {
                padding: 15px 20px;
            }

            .membership-card {
                padding: 20px;
            }

            .membership-name {
                font-size: 18px;
            }

            .price {
                font-size: 20px;
            }

            .feature-item {
                font-size: 13px;
            }

            .select-btn {
                padding: 12px;
                font-size: 14px;
            }

            .tab-icon {
                font-size: 18px;
            }

            .tab-label {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <div class="back-btn" onclick="window.location.href='personal-center.html'">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1 class="page-title">会员权益</h1>
            <div style="width: 40px;"></div> <!-- 占位元素，保持标题居中 -->
        </div>

        <!-- 会员卡片区域 -->
        <div class="membership-cards">
            <!-- 基础会员 -->
            <div class="membership-card">
                <div class="membership-header">
                    <h2 class="membership-name">基础会员</h2>
                    <div class="membership-price">
                        <div class="price">¥0</div>
                        <div class="price-unit">永久</div>
                    </div>
                </div>
                <div class="membership-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>基础口语练习功能</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>每日1次免费练习</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>基础学习报告</span>
                    </div>
                    <div class="feature-item unavailable">
                        <i class="fas fa-times-circle"></i>
                        <span>个性化学习计划</span>
                    </div>
                    <div class="feature-item unavailable">
                        <i class="fas fa-times-circle"></i>
                        <span>高级发音纠正</span>
                    </div>
                    <div class="feature-item unavailable">
                        <i class="fas fa-times-circle"></i>
                        <span>无广告体验</span>
                    </div>
                </div>
                <button class="select-btn outlined">当前方案</button>
            </div>

            <!-- 高级会员 -->
            <div class="membership-card popular">
                <div class="popular-badge">推荐</div>
                <div class="membership-header">
                    <h2 class="membership-name">高级会员</h2>
                    <div class="membership-price">
                        <div class="price">¥29.9</div>
                        <div class="price-unit">月</div>
                    </div>
                </div>
                <div class="membership-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>全部口语练习功能</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>无限次练习</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>详细学习报告</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>个性化学习计划</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>高级发音纠正</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>无广告体验</span>
                    </div>
                </div>
                <button class="select-btn">立即开通</button>
            </div>

            <!-- 年度会员 -->
            <div class="membership-card">
                <div class="membership-header">
                    <h2 class="membership-name">年度会员</h2>
                    <div class="membership-price">
                        <div class="price">¥299</div>
                        <div class="price-unit">年</div>
                    </div>
                </div>
                <div class="membership-features">
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>全部高级会员功能</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>额外赠送2个月</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>专属学习顾问</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>优先体验新功能</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>学习数据导出</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-check-circle"></i>
                        <span>专属学习社群</span>
                    </div>
                </div>
                <button class="select-btn">立即开通</button>
            </div>
        </div>

        <!-- 底部Tab栏 -->
        <div class="bottom-tab">
            <div class="tab-list">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-home tab-icon"></i>
                    <span class="tab-label">首页</span>
                </div>
                <div class="tab-item" onclick="window.location.href='practice-library.html'">
                    <i class="fas fa-book tab-icon"></i>
                    <span class="tab-label">练习</span>
                </div>
                <div class="tab-item" onclick="window.location.href='learning-report.html'">
                    <i class="fas fa-chart-line tab-icon"></i>
                    <span class="tab-label">学习</span>
                </div>
                <div class="tab-item active">
                    <i class="fas fa-user tab-icon"></i>
                    <span class="tab-label">我的</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 底部Tab栏切换
        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach((item, index) => {
            item.addEventListener('click', function() {
                // 移除所有激活状态
                tabItems.forEach(tab => tab.classList.remove('active'));
                // 添加当前激活状态
                this.classList.add('active');
            });
        });

        // 滚动动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.membership-card').forEach(element => {
            element.style.opacity = '0';
            element.style.transform = 'translateY(30px)';
            element.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(element);
        });
    </script>
</body>
</html>
