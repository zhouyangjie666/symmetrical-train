<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - AI口语陪练与纠音系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px; /* 为底部Tab栏留出空间 */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            background: white;
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #edf2f7;
            transform: translateX(-5px);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            flex: 1;
            text-align: center;
        }

        /* 订单筛选区域 */
        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #4a5568;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .filter-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* 订单列表 */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .order-item {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        .order-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .order-id {
            font-size: 14px;
            color: #4a5568;
        }

        .order-status {
            font-size: 14px;
            font-weight: 600;
            color: #48bb78;
        }

        .order-status.pending {
            color: #ed8936;
        }

        .order-status.failed {
            color: #f56565;
        }

        .order-content {
            margin-bottom: 15px;
        }

        .order-product {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .product-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 5px;
        }

        .product-desc {
            font-size: 14px;
            color: #4a5568;
        }

        .order-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .order-price {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .order-date {
            font-size: 14px;
            color: #718096;
        }

        .order-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 12px;
            color: #4a5568;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .action-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        /* 空状态 */
        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #a0aec0;
            margin: 0 auto 20px;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a202c;
            margin-bottom: 10px;
        }

        .empty-desc {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .empty-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .empty-btn:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-3px);
        }

        /* 底部Tab栏 */
        .bottom-tab {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            border-radius: 20px 20px 0 0;
            padding: 15px 0;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .tab-list {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 12px;
        }

        .tab-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-icon {
            font-size: 20px;
        }

        .tab-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                padding-bottom: 70px;
            }

            .header {
                padding: 15px 20px;
            }

            .filter-section {
                padding: 15px;
            }

            .order-item {
                padding: 20px;
            }

            .product-icon {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .product-name {
                font-size: 14px;
            }

            .product-desc {
                font-size: 12px;
            }

            .order-price {
                font-size: 16px;
            }

            .order-date {
                font-size: 12px;
            }

            .action-btn {
                padding: 6px 12px;
                font-size: 11px;
            }

            .empty-state {
                padding: 40px 20px;
            }

            .empty-icon {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .tab-icon {
                font-size: 18px;
            }

            .tab-label {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <div class="back-btn" onclick="window.location.href='personal-center.html'">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h1 class="page-title">我的订单</h1>
            <div style="width: 40px;"></div> <!-- 占位元素，保持标题居中 -->
        </div>

        <!-- 订单筛选区域 -->
        <div class="filter-section">
            <div class="filter-tabs">
                <div class="filter-tab active">全部</div>
                <div class="filter-tab">待支付</div>
                <div class="filter-tab">已完成</div>
                <div class="filter-tab">已取消</div>
            </div>
        </div>

        <!-- 订单列表 -->
        <div class="order-list">
            <!-- 订单1 -->
            <div class="order-item">
                <div class="order-header">
                    <div class="order-id">订单号：20240520001</div>
                    <div class="order-status">已完成</div>
                </div>
                <div class="order-content">
                    <div class="order-product">
                        <div class="product-icon">
                            <i class="fas fa-crown"></i>
                        </div>
                        <div class="product-info">
                            <div class="product-name">高级会员月度订阅</div>
                            <div class="product-desc">有效期：2024-05-20 至 2024-06-20</div>
                        </div>
                    </div>
                </div>
                <div class="order-footer">
                    <div class="order-price">¥29.90</div>
                    <div class="order-date">2024-05-20 14:30</div>
                </div>
            </div>

            <!-- 订单2 -->
            <div class="order-item">
                <div class="order-header">
                    <div class="order-id">订单号：20240420001</div>
                    <div class="order-status">已完成</div>
                </div>
                <div class="order-content">
                    <div class="order-product">
                        <div class="product-icon">
                            <i class="fas fa-crown"></i>
                        </div>
                        <div class="product-info">
                            <div class="product-name">高级会员月度订阅</div>
                            <div class="product-desc">有效期：2024-04-20 至 2024-05-20</div>
                        </div>
                    </div>
                </div>
                <div class="order-footer">
                    <div class="order-price">¥29.90</div>
                    <div class="order-date">2024-04-20 09:15</div>
                </div>
            </div>

            <!-- 订单3 -->
            <div class="order-item">
                <div class="order-header">
                    <div class="order-id">订单号：20240320001</div>
                    <div class="order-status">已完成</div>
                </div>
                <div class="order-content">
                    <div class="order-product">
                        <div class="product-icon">
                            <i class="fas fa-crown"></i>
                        </div>
                        <div class="product-info">
                            <div class="product-name">高级会员月度订阅</div>
                            <div class="product-desc">有效期：2024-03-20 至 2024-04-20</div>
                        </div>
                    </div>
                </div>
                <div class="order-footer">
                    <div class="order-price">¥29.90</div>
                    <div class="order-date">2024-03-20 16:45</div>
                </div>
            </div>
        </div>

        <!-- 底部Tab栏 -->
        <div class="bottom-tab">
            <div class="tab-list">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-home tab-icon"></i>
                    <span class="tab-label">首页</span>
                </div>
                <div class="tab-item" onclick="window.location.href='practice-library.html'">
                    <i class="fas fa-book tab-icon"></i>
                    <span class="tab-label">练习</span>
                </div>
                <div class="tab-item" onclick="window.location.href='learning-report.html'">
                    <i class="fas fa-chart-line tab-icon"></i>
                    <span class="tab-label">学习</span>
                </div>
                <div class="tab-item active">
                    <i class="fas fa-user tab-icon"></i>
                    <span class="tab-label">我的</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 筛选标签切换
        const filterTabs = document.querySelectorAll('.filter-tab');
        filterTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                filterTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // 这里可以添加实际的筛选逻辑
                console.log('筛选:', this.textContent);
            });
        });

        // 底部Tab栏切换
        const tabItems = document.querySelectorAll('.tab-item');
        tabItems.forEach((item, index) => {
            item.addEventListener('click', function() {
                // 移除所有激活状态
                tabItems.forEach(tab => tab.classList.remove('active'));
                // 添加当前激活状态
                this.classList.add('active');
            });
        });

        // 滚动动画
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.order-item').forEach(element => {
            element.style.opacity = '0';
            element.style.transform = 'translateY(30px)';
            element.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(element);
        });
    </script>
</body>
</html>
